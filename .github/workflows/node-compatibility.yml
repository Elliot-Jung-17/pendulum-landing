name: Landing Node Compatibility

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: landing-node-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quick-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check
